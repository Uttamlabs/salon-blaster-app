<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wa.blaster // extractor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        body {
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #000000;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #fafafa;
            padding: 30px;
            border: 2px dashed #000000;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 { font-size: 1.2rem; margin-top: 0; margin-bottom: 10px; }
        p { font-size: 0.9rem; color: #666666; margin-bottom: 20px; }
        button {
            background-color: #000000; color: #ffffff;
            border: 2px solid #000000; padding: 12px 24px;
            font-size: 16px; border-radius: 9999px;
            cursor: pointer; width: 100%; font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: #ffffff; color: #000000; transform: translateY(-1px);
        }
        #status { margin-top: 20px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h2>mobile contact extractor</h2>
        <p>select contacts from your phone to generate a formatted list.</p>
        <button id="selectContactsBtn">extract contacts</button>
        <div id="status"></div>
    </div>

    <script>
        const btn = document.getElementById('selectContactsBtn');
        const statusDiv = document.getElementById('status');

        function formatTo91(number) {
            let cleanNum = number.replace(/\D/g, '');
            if (cleanNum.length === 10) return '91' + cleanNum;
            if (cleanNum.length === 11 && cleanNum.startsWith('0')) return '91' + cleanNum.substring(1);
            if (cleanNum.length === 12 && cleanNum.startsWith('91')) return cleanNum;
            return cleanNum;
        }

        btn.addEventListener('click', async () => {
            if (!('contacts' in navigator && 'ContactsManager' in window)) {
                statusDiv.innerHTML = '<span style="color:#d32f2f;">Not supported. Please use Chrome on Android.</span>';
                return;
            }
            try {
                const props = ['name', 'tel'];
                const opts = { multiple: true };
                const contacts = await navigator.contacts.select(props, opts);
                
                if (!contacts.length) {
                    statusDiv.innerText = "No contacts selected.";
                    return;
                }

                statusDiv.innerText = `Processing ${contacts.length} contacts...`;
                let csvContent = "Name,Phone\n";

                contacts.forEach(contact => {
                    const name = contact.name ? contact.name[0] : 'Unknown';
                    if (contact.tel && contact.tel.length > 0) {
                        contact.tel.forEach(phone => {
                            const formattedNum = formatTo91(phone);
                            csvContent += `"${name}",${formattedNum}\n`;
                        });
                    }
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", "blaster_contacts.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                statusDiv.innerHTML = `<span style="color:#2e7d32;">✅ Extracted ${contacts.length} contacts!<br><br>You can now close this tab and return to the main app to upload.</span>`;
            } catch (error) {
                statusDiv.innerHTML = `<span style="color:#d32f2f;">Error: ${error.message}</span>`;
            }
        });
    </script>
</body>
</html>
